name: Gloss
options:
  bundleIdPrefix: com.smartnotes
  deploymentTarget:
    iOS: "17.0"

targets:
  Gloss:
    type: application
    platform: iOS
    sources:
      - path: SmartNotes
    settings:
      base:
        # Bundle id stays com.smartnotes.app so existing installs keep their data.
        PRODUCT_BUNDLE_IDENTIFIER: com.smartnotes.app
        PRODUCT_NAME: Gloss
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"        # iPhone + iPad
        SUPPORTS_MACCATALYST: NO
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Config/SmartNotes-Info.plist
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: "\"SmartNotes/Preview Content\""
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: "5.9"

  SmartNotesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SmartNotesTests
    dependencies:
      - target: Gloss
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

  SmartNotesUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SmartNotesUITests
    dependencies:
      - target: Gloss
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Gloss:
    build:
      targets:
        Gloss: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SmartNotesTests
        - SmartNotesUITests
